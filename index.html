<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>XRPL Vanity Address Search</title>
		<script src="https://unpkg.com/xrpl@latest/build/xrpl-latest-min.js"></script>
		<style>
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				background: #0f172a;
				color: #f8fafc;
				display: flex;
				justify-content: center;
				padding: 20px;
			}
			.card {
				background: #1e293b;
				width: 100%;
				max-width: 700px;
				padding: 40px;
				border-radius: 16px;
				border: 1px solid #334155;
				box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
			}
			h2 {
				margin: 0;
				color: #38bdf8;
				font-size: 1.6rem;
				text-align: center;
			}

			.setting-group {
				background: #0f172a;
				padding: 20px;
				border-radius: 10px;
				margin: 20px 0;
				border: 1px solid #334155;
			}
			.setting-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-bottom: 10px;
			}
			#threadInput {
				width: 80px;
				padding: 10px;
				background: #1e293b;
				border: 1px solid #38bdf8;
				color: #38bdf8;
				border-radius: 6px;
				font-weight: bold;
				text-align: center;
				font-size: 1.1rem;
			}

			.estimate-box {
				background: #1e293b;
				border-left: 4px solid #38bdf8;
				padding: 15px;
				margin-bottom: 20px;
				font-size: 0.9rem;
				color: #94a3b8;
			}
			.estimate-val {
				color: #f8fafc;
				font-weight: bold;
				font-family: monospace;
			}

			input[type="text"] {
				width: 100%;
				padding: 18px;
				margin-bottom: 20px;
				border: 1px solid #334155;
				border-radius: 10px;
				font-size: 22px;
				background: #0f172a;
				color: #fff;
				box-sizing: border-box;
				outline: none;
				font-family: monospace;
			}

			.btn-group {
				display: flex;
				gap: 15px;
			}
			button {
				flex: 1;
				padding: 18px;
				border: none;
				border-radius: 10px;
				font-weight: bold;
				cursor: pointer;
				text-transform: uppercase;
			}
			#startBtn {
				background: #38bdf8;
				color: #0f172a;
			}
			#stopBtn {
				background: #475569;
				color: #cbd5e1;
			}
			button:disabled {
				opacity: 0.2;
			}

			.monitor {
				background: #000;
				padding: 25px;
				border-radius: 12px;
				margin-top: 25px;
				border: 1px solid #00ff41;
			}
			.stats-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 15px;
				font-family: monospace;
				color: #00ff41;
				margin-bottom: 15px;
				font-size: 0.9rem;
			}
			#liveAddr {
				font-family: monospace;
				font-size: 1.2rem;
				color: #00ff41;
				border-bottom: 1px solid #111;
				padding-bottom: 10px;
				margin-bottom: 10px;
				opacity: 0.8;
			}

			#result {
				margin-top: 30px;
				padding: 25px;
				background: #064e3b;
				border: 2px solid #10b981;
				border-radius: 12px;
				display: none;
			}
			.seed-box {
				background: #450a0a;
				color: #f87171;
				padding: 15px;
				border-radius: 8px;
				font-family: monospace;
				margin-top: 10px;
				word-break: break-all;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h2>XRPL Vanity Address Search</h2>

			<div class="setting-group">
				<div class="setting-row">
					<label>Parallel Threads</label>
					<input type="number" id="threadInput" value="4" min="1" max="16" />
				</div>
				<div class="estimate-box" id="calcBox">
					Difficulty: <span class="estimate-val" id="diffVal">-</span><br />
					Est. Time (50% prob): <span class="estimate-val" id="timeVal">-</span>
				</div>
			</div>

			<input type="text" id="prefixInput" placeholder="Target Prefix (e.g. XRPL)" spellcheck="false" maxlength="10" />

			<div class="btn-group">
				<button id="startBtn">Start Search</button>
				<button id="stopBtn" disabled>Stop</button>
			</div>

			<div class="monitor">
				<div class="stats-grid">
					<span>STATUS: <span id="statusText">READY</span></span>
					<span>WORKERS: <span id="activeCount">0</span></span>
					<span>SPEED: <span id="speedVal">0</span> HPS</span>
					<span>TOTAL: <span id="totalCount">0</span></span>
				</div>
				<div id="liveAddr">r.................................</div>
			</div>

			<div id="result">
				<h3 style="color: #34d399; margin-top: 0">🎯 MATCH FOUND!</h3>
				<div id="resAddr" style="font-family: monospace; color: #fff"></div>
				<div class="seed-box" id="resSeed"></div>
			</div>
		</div>

		<script>
			let workers = [];
			let totalAttempts = 0;
			let startTime = 0;
			const BASE58_ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

			const prefixInput = document.getElementById("prefixInput");
			const threadInput = document.getElementById("threadInput");

			//難易度と時間のリアルタイム計算
			function updateEstimates() {
				const prefix = prefixInput.value.trim();
				if (!prefix) return;

				const difficulty = Math.pow(58, prefix.length);
				document.getElementById("diffVal").innerText = "1 / " + difficulty.toLocaleString();

				// 過去の計測値があればそれを使用、なければ暫定値(1スレッドあたり150HPS)
				const currentHps = parseInt(document.getElementById("speedVal").innerText) || threadInput.value * 150;
				if (currentHps > 0) {
					const seconds = (difficulty * 0.693) / currentHps; // 50%確率の計算式
					document.getElementById("timeVal").innerText = formatTime(seconds);
				}
			}

			function formatTime(seconds) {
				if (seconds < 60) return Math.round(seconds) + " sec";
				if (seconds < 3600) return Math.round(seconds / 60) + " min";
				if (seconds < 86400) return Math.round(seconds / 3600) + " hours";
				return Math.round(seconds / 86400) + " days";
			}

			prefixInput.oninput = updateEstimates;
			threadInput.onchange = updateEstimates;

			const workerCode = `
        importScripts('https://unpkg.com/xrpl@latest/build/xrpl-latest-min.js');
        self.onmessage = function(e) {
            const { prefix } = e.data;
            let count = 0;
            while (true) {
                count++;
                const wallet = xrpl.Wallet.generate();
                if (count % 250 === 0) {
                    self.postMessage({ type: 'progress', count: 250, lastAddr: (count % 1000 === 0 ? wallet.address : null) });
                }
                if (wallet.address.substring(1).startsWith(prefix)) {
                    self.postMessage({ type: 'success', wallet: { address: wallet.address, seed: wallet.seed }});
                    break;
                }
            }
        };
    `;

			const blob = new Blob([workerCode], { type: "application/javascript" });
			const workerUrl = URL.createObjectURL(blob);

			function start() {
				const prefix = prefixInput.value.trim();
				const threads = parseInt(threadInput.value);
				if (!prefix || /[0OIl]/.test(prefix)) return alert("Invalid characters.");

				totalAttempts = 0;
				startTime = Date.now();
				document.getElementById("result").style.display = "none";
				document.getElementById("startBtn").disabled = true;
				document.getElementById("stopBtn").disabled = false;
				document.getElementById("statusText").innerText = "RUNNING";
				document.getElementById("activeCount").innerText = threads;

				for (let i = 0; i < threads; i++) {
					const worker = new Worker(workerUrl);
					worker.onmessage = function (e) {
						if (e.data.type === "progress") {
							totalAttempts += e.data.count;
							const elapsed = (Date.now() - startTime) / 1000;
							const hps = Math.round(totalAttempts / elapsed);
							document.getElementById("totalCount").innerText = totalAttempts.toLocaleString();
							document.getElementById("speedVal").innerText = hps;
							if (e.data.lastAddr) {
								document.getElementById("liveAddr").innerText = e.data.lastAddr;
								updateEstimates(); // スピードに基づいて時間を再計算
							}
						} else if (e.data.type === "success") {
							stop();
							document.getElementById("resAddr").innerText = "Address: " + e.data.wallet.address;
							document.getElementById("resSeed").innerText = "Seed: " + e.data.wallet.seed;
							document.getElementById("result").style.display = "block";
						}
					};
					worker.postMessage({ prefix });
					workers.push(worker);
				}
			}

			function stop() {
				workers.forEach((w) => w.terminate());
				workers = [];
				document.getElementById("startBtn").disabled = false;
				document.getElementById("stopBtn").disabled = true;
				document.getElementById("statusText").innerText = "STOPPED";
			}

			document.getElementById("startBtn").onclick = start;
			document.getElementById("stopBtn").onclick = stop;
		</script>
	</body>
</html>
